services:
  # Redis - API key cache and rate limiting
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Go API Gateway - authenticates SDK traffic, injects tenant_id, forwards to collector
  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: gateway
    ports:
      - "8080:8080"
    environment:
      - GATEWAY_PORT=8080
      - COLLECTOR_ADDR=http://otel-collector:4318
      # Shared secret with the otel-collector's bearertokenauth extension.
      # Required — gateway refuses to start with an empty value (#25, F2/F3).
      - COLLECTOR_AUTH_TOKEN=${COLLECTOR_AUTH_TOKEN:?COLLECTOR_AUTH_TOKEN must be set in .env (run `openssl rand -hex 32`)}
      - REDIS_ADDR=redis:6379
      # Optional. When set, the gateway runs an API-key hydrate pass at
      # startup against Postgres (#26) — Redis flushes / stale-snapshot
      # restores / dashboard partial-failure residue all converge before
      # serving. Empty value skips hydrate (Redis-only mode).
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/ward
      - DEFAULT_RATE_LIMIT=10000
    depends_on:
      redis:
        condition: service_healthy
      otel-collector:
        # condition: service_healthy
        condition: service_started
      # Required for the startup hydrate (#26) — see DATABASE_URL above.
      # Use service_healthy so we don't race the migrations dashboard
      # applies when DATABASE_URL points at a freshly-up postgres.
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ClickHouse - stores traces, logs, and metrics
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: clickhouse
    ports:
      - "8123:8123"   # HTTP interface
      - "9000:9000"   # Native protocol
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - clickhouse_logs:/var/log/clickhouse-server
      - ./configs/clickhouse-config.xml:/etc/clickhouse-server/config.d/custom.xml
    environment:
      - CLICKHOUSE_DB=default
      - CLICKHOUSE_USER=otel
      - CLICKHOUSE_PASSWORD=otelpass
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # OTLP Collector - internal only, receives from gateway and forwards to ClickHouse
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: otel-collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./configs/otel-collector-config.yaml:/etc/otel-collector-config.yaml
    expose:
      - "4317"
      - "4318"
    environment:
      - CLICKHOUSE_HOST=clickhouse
      - CLICKHOUSE_DATABASE=default
      - CLICKHOUSE_USERNAME=otel
      - CLICKHOUSE_PASSWORD=otelpass
      # Must match the gateway's COLLECTOR_AUTH_TOKEN. The bearertokenauth
      # extension verifies inbound OTLP requests against this value.
      - COLLECTOR_AUTH_TOKEN=${COLLECTOR_AUTH_TOKEN:?COLLECTOR_AUTH_TOKEN must be set in .env (run `openssl rand -hex 32`)}
    depends_on:
      clickhouse:
        condition: service_started
        # condition: service_healthy
    # healthcheck:
    #   # test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:13133"]
    #   interval: 10s
    #   timeout: 5s
    #   retries: 5

  # Postgres - dashboard orgs, members, API keys (Prisma)
  postgres:
    image: postgres:16-alpine
    container_name: ward-postgres
    # Local mapped to 5434 to avoid port conflicts with other running postgres instances
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ward
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ward"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Ward Dashboard - Next.js web UI
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    container_name: dashboard
    ports:
      - "3001:3001"
    environment:
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL:-}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
      # Always use service DNS; host DATABASE_URL in .env is for Prisma CLI on the machine.
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/ward
      - CLICKHOUSE_URL=http://clickhouse:8123
      - CLICKHOUSE_USER=otel
      - CLICKHOUSE_PASSWORD=otelpass
      - REDIS_URL=redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy

  # Grafana - visualization and dashboards for traces stored in ClickHouse
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_INSTALL_PLUGINS=grafana-clickhouse-datasource
      - GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS=grafana-clickhouse-datasource
    volumes:
      - grafana_data:/var/lib/grafana
      - ./configs/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      clickhouse:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  clickhouse_data:
    driver: local
  clickhouse_logs:
    driver: local
  grafana_data:
    driver: local
  redis_data:
    driver: local
  postgres_data:
    driver: local

networks:
  default:
    name: ward-network
