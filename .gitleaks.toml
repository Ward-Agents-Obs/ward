# gitleaks v8 config ‚ÄĒ extends the built-in default ruleset.
#
# Goal: catch the F1 leak pattern (`ak_live_<32 hex>`) and any other
# bearer-token literal regardless of payload format, without false-positives
# on this repo. CI (see .github/workflows/secret-scan.yml) runs full-history
# with `--redact` so leak content never surfaces in CI logs.
#
# Decisions captured in this file:
# - History rewrite was rejected ‚ÄĒ the F1 commits are allowlisted by SHA
#   below, with a pointer to the audit doc explaining why.
# - The pre-commit hook scans staged content only; CI repeats the scan
#   across full history weekly. Both use this config.

[extend]
# Pull in the built-in detectors (AWS, GitHub, Slack, JWT, OpenAI, etc.).
# We add to them, not replace.
useDefault = true

# ---------------------------------------------------------------------------
# Custom rules
# ---------------------------------------------------------------------------

[[rules]]
id = "ward-api-key"
description = "Ward SDK API key (ak_live_<32 hex>)"
regex = '''ak_live_[0-9a-f]{32}'''
keywords = ["ak_live_"]

[[rules]]
id = "bearer-token-literal"
description = "Authorization Bearer token literal (any payload of substantive length)"
# Catches `Authorization: Bearer <token>` or `Bearer <token>` in headers / dict
# literals / config files when the token is high-enough entropy to be a real
# secret. Tuned to not fire on placeholder strings (allowlisted via stopwords)
# and to require ‚Č•20 chars of token payload.
regex = '''(?i)(?:authorization\s*[:=]\s*["']?\s*)?bearer[\s_:=]+["']?[A-Za-z0-9_\-\.]{20,}'''
keywords = ["bearer", "authorization"]

# ---------------------------------------------------------------------------
# Allowlist
# ---------------------------------------------------------------------------

[allowlist]
description = "Repo-wide skips: build outputs, lockfiles, audit doc."

# Known-historical leak fingerprints (F1 ‚ÄĒ see `.agents/tenant-isolation-audit.md`)
# are tracked in `.gitleaksignore` rather than this commit allowlist, so the skip
# is surgical: only the specific (commit,file,line,rule) findings are exempted,
# not entire commits. If a future commit reintroduces the same line content, it
# fires; if a different leak surfaces in commits 0ae6fa2 / d5770d1, it fires too.

paths = [
  # Build outputs / vendored dependencies ‚ÄĒ gitignored, but the pre-commit
  # hook would still scan them if a contributor forgets to gitignore.
  '''(^|/)\.next(/|$)''',
  '''(^|/)node_modules(/|$)''',
  '''(^|/)venv(/|$)''',
  '''(^|/)\.git(/|$)''',
  # Python bytecode caches ‚ÄĒ gitignored anyway, but exclude for `--no-git`
  # local scans to keep the signal-to-noise ratio of dev runs high.
  '''(^|/)__pycache__(/|$)''',
  # Lockfiles often contain hash-shaped strings that the JWT/generic detectors
  # false-positive on. Lockfiles can't carry useful secrets anyway.
  '''(^|/)package-lock\.json$''',
  '''(^|/)yarn\.lock$''',
  '''(^|/)pnpm-lock\.yaml$''',
  '''(^|/)go\.sum$''',
  # The audit doc references `<leaked-key>` only as a redacted placeholder
  # plus the sha256 of the historical key ‚ÄĒ never the literal.
  '''(^|/)\.agents/tenant-isolation-audit\.md$''',
  # Egg-info / package metadata
  '''(^|/)src/ward_sdk\.egg-info(/|$)''',
]

# Stopwords are matched against the leak's `Match` content (i.e. the full
# match span). Keeps the bearer-token-literal rule from firing on docs and
# code samples that show placeholder values.
stopwords = [
  "your-api-key-here",
  "your-ward-api-key",
  "your-openai-key",
  "your-openai-api-key",
  "your_openai_api_key_here",
  "your_anthropic_api_key_here",
  "your-supabase-anon-key",
  "ak_live_invalid_key_000000000000",
  "<your-api-key>",
  "<your-ward-api-key>",
  # Test fixtures for negative auth cases (TestCollectorAuth, #25). These
  # literals are intentionally wrong to drive a 401 in tests; they're not
  # secrets.
  "not-the-real-token-xxxxxxxxxxxx",
  "replace_me_with_openssl_rand_hex_32",
  # CI-only deterministic seed fixtures (#27 ‚ÄĒ `--key` flag in
  # `gateway/cmd/seed`). Used by `.github/workflows/tenant-isolation.yml`
  # to seed two test tenants with stable plaintext keys instead of parsing
  # stdout. Wiped by `docker compose down -v` at job teardown; never
  # touch real Redis/Postgres outside CI.
  "ak_live_aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa",
  "ak_live_bbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbb",
  "ak_live_a1a1a1a1a1a1a1a1a1a1a1a1a1a1a1a1",
  "ak_live_b2b2b2b2b2b2b2b2b2b2b2b2b2b2b2b2",
]

# Per-regex allowlist: literal test placeholders in src/tests/ and scripts/
# that look like keys but aren't. Each entry matches against the line content
# (the leak's `Match`), not just the secret payload.
regexes = [
  # Test placeholder keys used in src/tests/test_gateway_integration.py
  '''ak_live_invalid_key_[0-9_]+''',
  # ak_live_test_<random> generated by setup_test_environment.sh
  '''ak_live_test_\$\{[A-Z_]+\}|ak_live_test_\$\(openssl[^)]+\)''',
]
