name: secret-scan

# gitleaks runs in three modes:
#
#   - Pull request:    diff-only, ADVISORY (continue-on-error). Findings appear
#                      as PR check annotations + GitHub code-scanning alerts;
#                      the merge isn't blocked by gitleaks alone.
#   - Push to `main`:  full-history, FAIL-FAST. Stops a leaky merge from
#                      shipping. Allowlisted commits (.gitleaks.toml) are skipped.
#   - Weekly schedule: full-history, ADVISORY. Catches anything that bypassed
#                      the prior modes — e.g. force-push or new rules.
#
# All runs use --redact so the leak's payload never appears in CI logs or
# the SARIF upload (only file/line/rule). Config in `.gitleaks.toml`.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: "0 9 * * 0" # Sundays 09:00 UTC
  workflow_dispatch: {}

permissions:
  contents: read
  pull-requests: read
  security-events: write # required for code-scanning SARIF upload

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # PR scans need shallow clone (diff vs base); push/scheduled need
          # full history to honour the commit allowlist.
          fetch-depth: ${{ github.event_name == 'pull_request' && 1 || 0 }}

      - name: Determine mode
        id: mode
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "log_opts=--log-opts=${{ github.event.pull_request.base.sha }}..HEAD" >> "$GITHUB_OUTPUT"
            echo "advisory=true" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event_name }}" == "push" ]]; then
            echo "log_opts=" >> "$GITHUB_OUTPUT"
            echo "advisory=false" >> "$GITHUB_OUTPUT"
          else
            echo "log_opts=" >> "$GITHUB_OUTPUT"
            echo "advisory=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run gitleaks
        id: scan
        continue-on-error: ${{ steps.mode.outputs.advisory == 'true' }}
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/repo" \
            -w /repo \
            zricethezav/gitleaks:v8.30.1 \
            detect \
              --config .gitleaks.toml \
              --redact \
              --no-banner \
              --report-format sarif \
              --report-path gitleaks.sarif \
              ${{ steps.mode.outputs.log_opts }}

      - name: Upload SARIF to GitHub code scanning
        # Always upload even when advisory mode swallowed the failure — that's
        # how PR reviewers see the findings inline.
        if: always() && hashFiles('gitleaks.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: gitleaks.sarif
          category: gitleaks-${{ github.event_name }}

      - name: Fail the build (push to main only)
        if: steps.mode.outputs.advisory == 'false' && steps.scan.outcome == 'failure'
        run: |
          echo "::error::Secrets detected on push to main. See SARIF in the Security tab."
          exit 1
