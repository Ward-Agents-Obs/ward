name: tenant-isolation

# Regression test for tenant isolation across the SDK → gateway → ClickHouse →
# dashboard chain, plus the collector-auth defense-in-depth gate. See
# `.agents/tenant-isolation-audit.md` for the audit this is regression-
# protecting; B6 (#9) and #25 for the testing briefs.
#
# The job:
#   1. Generates a fresh COLLECTOR_AUTH_TOKEN per CI run (random hex-32).
#   2. Brings up docker-compose (clickhouse, redis, gateway, otel-collector)
#      with the token wired into both the gateway and otel-collector envs.
#   3. Seeds two tenants via `gateway/cmd/seed`.
#   4. Runs every `*-tenant-isolation.ts` script under `dashboard/__tests__/`
#      against the live ClickHouse (data-plane scoping).
#   5. Runs `TestTenantIsolation` against the live gateway (gateway-side
#      spoof resistance).
#   6. Runs `TestCollectorAuth` against the collector socket (defense-in-
#      depth bearertokenauth gate).
#
# Triggered on PRs and push-to-main only — not on a schedule, since the
# data/auth layer never changes drift-style and a regression here is always
# something a code change introduced.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  tenant-isolation:
    name: tenant-isolation regression
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go (for gateway seed)
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: gateway/go.sum

      - name: Set up Node (for tsx test runner)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Set up Python (for pytest spoof tests)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dashboard dependencies
        working-directory: dashboard
        run: npm ci

      - name: Install Python test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest requests opentelemetry-proto

      - name: Generate collector auth token
        id: token
        run: |
          # Fresh per-run token. Both the gateway and the otel-collector read
          # this from COLLECTOR_AUTH_TOKEN; the gateway refuses to start if
          # empty (#25). Mask it so it never leaks into logs.
          token="$(openssl rand -hex 32)"
          echo "::add-mask::$token"
          echo "value=$token" >> "$GITHUB_OUTPUT"

      - name: Bring up data services + apply Prisma migrations
        env:
          COLLECTOR_AUTH_TOKEN: ${{ steps.token.outputs.value }}
        run: |
          # Provide harmless dummy Supabase env so the dashboard container
          # build doesn't fail. The dashboard service is unused by these tests
          # but compose otherwise exits non-zero.
          export NEXT_PUBLIC_SUPABASE_URL="https://example.supabase.co"
          export NEXT_PUBLIC_SUPABASE_ANON_KEY="placeholder"
          # Bring up Postgres + Redis + ClickHouse + collector first so the
          # gateway has the schema it needs for the API-key hydrate (#26).
          docker compose up -d postgres redis clickhouse otel-collector
          # Wait for postgres + clickhouse healthchecks.
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8123/ping > /dev/null \
               && docker compose ps postgres --format '{{ "{{" }}.Health{{ "}}" }}' | grep -q healthy; then
              echo "data services are up"; break
            fi
            echo "waiting for data services ($i)..."; sleep 2
          done
          # Apply Prisma migrations against the fresh Postgres so the gateway's
          # hydrate query (`SELECT … FROM api_keys ⨝ organizations`) doesn't
          # error on missing tables. Maps to docker-compose's port 5434.
          (cd dashboard && DATABASE_URL=postgresql://postgres:postgres@localhost:5434/ward npx prisma migrate deploy)

      - name: Bring up gateway
        env:
          COLLECTOR_AUTH_TOKEN: ${{ steps.token.outputs.value }}
        run: |
          export NEXT_PUBLIC_SUPABASE_URL="https://example.supabase.co"
          export NEXT_PUBLIC_SUPABASE_ANON_KEY="placeholder"
          docker compose up -d gateway
          # Wait for the gateway healthcheck. Hydrate runs synchronously
          # inside the container before the listener starts, so /health
          # responding 200 is sufficient evidence hydrate completed.
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8080/health > /dev/null; then
              echo "gateway is up"; break
            fi
            echo "waiting for gateway ($i)..."; sleep 2
          done
          curl -sf http://localhost:8080/health

      - name: Seed two tenants via gateway/cmd/seed
        id: seed
        working-directory: gateway
        env:
          # seed talks to Redis directly + opens its own Postgres connection
          # for the dual-write (#27). DATABASE_URL maps to the host port the
          # postgres compose service exposes (5434:5432).
          REDIS_ADDR: localhost:6379
          DATABASE_URL: postgresql://postgres:postgres@localhost:5434/ward
        run: |
          set -euo pipefail
          # #27: --key takes a deterministic plaintext so we don't have to
          # parse stdout. Keys are CI-only and cleaned up by `docker compose
          # down -v` at job teardown. The values look like real keys but are
          # ephemeral fixtures — gitleaks rule `ward-api-key` would flag any
          # such literal in source, hence stopword-allowlisted only here.
          KEY_A="ak_live_a1a1a1a1a1a1a1a1a1a1a1a1a1a1a1a1"
          KEY_B="ak_live_b2b2b2b2b2b2b2b2b2b2b2b2b2b2b2b2"
          go run ./cmd/seed --tenant ci-tenant-A --key "$KEY_A"
          go run ./cmd/seed --tenant ci-tenant-B --key "$KEY_B"
          # Mask the keys in subsequent log lines (defense in depth even
          # though they're well-known fixtures — keeps the habit).
          echo "::add-mask::$KEY_A"
          echo "::add-mask::$KEY_B"
          {
            echo "key_a=$KEY_A"
            echo "key_b=$KEY_B"
            echo "tenant_a=ci-tenant-A"
            echo "tenant_b=ci-tenant-B"
          } >> "$GITHUB_OUTPUT"

      - name: Run dashboard query tenant-isolation tests
        working-directory: dashboard
        env:
          CLICKHOUSE_URL: http://localhost:8123
          CLICKHOUSE_USER: otel
          CLICKHOUSE_PASSWORD: otelpass
        run: bash scripts/run-tenant-isolation-tests.sh

      - name: Run gateway spoof regression tests
        env:
          GATEWAY_URL: http://localhost:8080
          CLICKHOUSE_URL: http://localhost:8123
          CLICKHOUSE_USER: otel
          CLICKHOUSE_PASSWORD: otelpass
          WARD_TEST_API_KEY: ${{ steps.seed.outputs.key_a }}
          WARD_TEST_TENANT_ID: ${{ steps.seed.outputs.tenant_a }}
          WARD_TEST_API_KEY_B: ${{ steps.seed.outputs.key_b }}
          WARD_TEST_TENANT_ID_B: ${{ steps.seed.outputs.tenant_b }}
        run: |
          python -m pytest \
            src/tests/test_gateway_integration.py::TestTenantIsolation \
            -v --tb=short

      - name: Run collector-auth defense-in-depth tests
        env:
          # TestCollectorAuth probes the collector's bearertokenauth extension
          # from inside the ward-network via an ephemeral curl container.
          # Needs the same token the live gateway/collector are using.
          COLLECTOR_AUTH_TOKEN: ${{ steps.token.outputs.value }}
        run: |
          python -m pytest \
            src/tests/test_gateway_integration.py::TestCollectorAuth \
            -v --tb=short

      - name: Run API-key hydrate regression tests
        env:
          # TestApiKeyHydrate writes Org + ApiKey rows directly to Postgres,
          # plants Redis state, restarts the gateway, and asserts hydrate
          # converged correctly. Needs the same token to bring the gateway
          # back up after each restart.
          COLLECTOR_AUTH_TOKEN: ${{ steps.token.outputs.value }}
        run: |
          python -m pytest \
            src/tests/test_gateway_integration.py::TestApiKeyHydrate \
            -v --tb=short

      - name: Dump container logs on failure
        if: failure()
        env:
          # Compose substitution requires the token even for `logs`.
          COLLECTOR_AUTH_TOKEN: ${{ steps.token.outputs.value }}
        run: |
          echo "=== gateway ===";        docker compose logs gateway || true
          echo "=== otel-collector ==="; docker compose logs otel-collector || true
          echo "=== clickhouse ===";     docker compose logs clickhouse || true
          echo "=== redis ===";          docker compose logs redis || true
          echo "=== postgres ===";       docker compose logs postgres || true

      - name: Tear down docker-compose
        if: always()
        env:
          COLLECTOR_AUTH_TOKEN: ${{ steps.token.outputs.value }}
        run: docker compose down -v
